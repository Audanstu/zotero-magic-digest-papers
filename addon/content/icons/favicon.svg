<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square with subtle border -->
  <rect x="3" y="3" width="90" height="90" rx="21" ry="21" fill="#1e293b" opacity="0.6"/>
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="url(#bg)" stroke="#334155" stroke-width="1"/>

  <!-- Card 1 (left/top) -->
  <rect x="18" y="22" width="34" height="44" rx="6" ry="6" fill="url(#card1)" opacity="0.9"/>

  <!-- Card 2 (right/bottom) -->
  <rect x="38" y="34" width="34" height="44" rx="6" ry="6" fill="url(#card2)" opacity="0.9"/>

  <!-- Text lines card 1 -->
  <rect x="24" y="30" width="14" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>
  <rect x="24" y="37" width="20" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="24" y="43" width="16" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="24" y="49" width="18" height="2" rx="1" fill="#ffffff" opacity="0.25"/>

  <!-- Text lines card 2 -->
  <rect x="44" y="42" width="14" height="3" rx="1.5" fill="#ffffff" opacity="0.5"/>
  <rect x="44" y="49" width="20" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="44" y="55" width="16" height="2" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="44" y="61" width="18" height="2" rx="1" fill="#ffffff" opacity="0.25"/>

  <!-- AI sparkle node (connector) -->
  <circle cx="52" cy="28" r="4" fill="#fbbf24" opacity="0.95"/>
  <circle cx="52" cy="28" r="7" fill="#fbbf24" opacity="0.15"/>

  <!-- Accent dots -->
  <circle cx="70" cy="70" r="3" fill="#22d3ee" opacity="0.8"/>
  <circle cx="28" cy="72" r="2.5" fill="#22d3ee" opacity="0.6"/>
</svg>
